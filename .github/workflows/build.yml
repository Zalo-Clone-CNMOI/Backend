name: Release Gate

on:
  pull_request:
    branches: [main, develop]
    paths:
      - "apps/**"
      - "libs/**"
      - "test/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "openapitools.json"
      - ".github/workflows/build.yml"

jobs:
  release-gate:
    name: Final Release Gate
    runs-on: ubuntu-latest

    steps:
      # --------------------------------------------
      # Checkout
      # --------------------------------------------
      - name: Checkout code
        uses: actions/checkout@v4

      # --------------------------------------------
      # Install pnpm (must precede setup-node so cache: pnpm resolves the store path)
      # --------------------------------------------
      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9
          run_install: false

      # --------------------------------------------
      # Setup Node.js with pnpm store cache
      # --------------------------------------------
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      # --------------------------------------------
      # Install deps
      # --------------------------------------------
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # --------------------------------------------
      # Lint
      # --------------------------------------------
      - name: Run lint
        run: pnpm run lint

      # --------------------------------------------
      # OpenAPI Codegen Drift Check
      # --------------------------------------------
      - name: Verify OpenAPI codegen is in sync
        run: pnpm run codegen:check

      # --------------------------------------------
      # Unit Test Gate
      # --------------------------------------------
      - name: Run unit tests with coverage
        run: pnpm run test:ci

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 14

      # --------------------------------------------
      # Integration and E2E Gates
      # --------------------------------------------
      - name: Run integration tests
        run: pnpm run test:integration

      - name: Run e2e tests
        run: pnpm run test:e2e

      # --------------------------------------------
      # Security audit gate (prod dependencies)
      # --------------------------------------------
      - name: Run production dependency audit
        run: pnpm run audit:prod

      - name: Run build for all services
        run: pnpm run build:all
