# ================================================
# GitHub Actions - Build Only (for PRs)
# ================================================
# Runs on pull requests to verify builds work
# ================================================

name: Build Check

on:
  pull_request:
    branches:
      - main
      - develop
    paths:
      - 'apps/**'
      - 'libs/**'
      - 'package.json'
      - 'pnpm-lock.yaml'

jobs:
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest

    steps:
      # --------------------------------------------
      # Checkout source
      # --------------------------------------------
      - name: Checkout code
        uses: actions/checkout@v4

      # --------------------------------------------
      # Setup Node.js + pnpm cache (BEST PRACTICE)
      # --------------------------------------------
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9
          run_install: false

      # --------------------------------------------
      # Install dependencies
      # --------------------------------------------
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # --------------------------------------------
      # Lint
      # --------------------------------------------
      - name: Run lint
        run: pnpm run lint


  build-check:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: lint-and-test

    strategy:
      matrix:
        service:
          - bff-service
          - sso-service
          - interaction-service

    steps:
      # --------------------------------------------
      # Checkout source
      # --------------------------------------------
      - name: Checkout code
        uses: actions/checkout@v4

      # --------------------------------------------
      # Setup Docker Buildx
      # --------------------------------------------
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # --------------------------------------------
      # Build Docker image (no push)
      # --------------------------------------------
      - name: Build Docker image (no push)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/${{ matrix.service }}/Dockerfile
          push: false
          tags: zalo-clone/${{ matrix.service }}:pr-${{ github.event.pull_request.number }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
