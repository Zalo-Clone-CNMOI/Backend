name: Build Check

on:
  pull_request:
    branches: [main, develop]
    paths:
      - "apps/**"
      - "libs/**"
      - "package.json"
      - "pnpm-lock.yaml"

jobs:
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest

    steps:
      # --------------------------------------------
      # Checkout
      # --------------------------------------------
      - name: Checkout code
        uses: actions/checkout@v4

      # --------------------------------------------
      # Setup Node.js (NO pnpm cache here)
      # --------------------------------------------
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # --------------------------------------------
      # Install pnpm + auto cache
      # --------------------------------------------
      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9
          run_install: false

      # --------------------------------------------
      # Install deps
      # --------------------------------------------
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # --------------------------------------------
      # Lint
      # --------------------------------------------
      - name: Run lint
        run: pnpm run lint

      # --------------------------------------------
      # Security audit gate (prod dependencies)
      # --------------------------------------------
      - name: Run production dependency audit
        run: pnpm run audit:prod

      # --------------------------------------------
      # Test with coverage
      # --------------------------------------------
      - name: Run tests with coverage
        run: pnpm run test:ci

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 14

      - name: Run build for all services
        run: pnpm run build:all
