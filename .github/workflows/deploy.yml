name: CI/CD Pipeline

on:
  push:
    branches: [main]
    paths:
      - "apps/**"
      - "libs/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "infra-compose.yml"
      - "db-compose.yml"
      - "app-compose.yml"
      - ".github/workflows/**"

  workflow_dispatch:
    inputs:
      service:
        description: "Service to deploy (all, bff, sso, interaction, media, chat, ws, presence, notification, ai)"
        required: false
        default: "all"

permissions:
  contents: read
  packages: write

env:
  DOCKER_REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}/zalo-clone
  EC2_HOST: ${{ secrets.EC2_HOST }}
  EC2_USER: ${{ secrets.EC2_USER }}
  EC2_SSH_PRIVATE_KEY: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      bff: ${{ steps.detect.outputs.bff }}
      sso: ${{ steps.detect.outputs.sso }}
      interaction: ${{ steps.detect.outputs.interaction }}
      media: ${{ steps.detect.outputs.media }}
      chat: ${{ steps.detect.outputs.chat }}
      ws: ${{ steps.detect.outputs.ws }}
      presence: ${{ steps.detect.outputs.presence }}
      notification: ${{ steps.detect.outputs.notification }}
      ai: ${{ steps.detect.outputs.ai }}
      any_service: ${{ steps.detect.outputs.any_service }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - id: detect
        name: Detect changes
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ github.event.inputs.force }}" = "true" ]; then
            for s in bff sso interaction media chat ws presence notification ai; do
              echo "$s=true" >> $GITHUB_OUTPUT
            done
            echo "any_service=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            SERVICE="${{ github.event.inputs.service }}"
            for s in bff sso interaction media chat ws presence notification ai; do
              if [ "$SERVICE" = "all" ] || [ "$SERVICE" = "$s" ]; then
                echo "$s=true" >> $GITHUB_OUTPUT
              else
                echo "$s=false" >> $GITHUB_OUTPUT
              fi
            done
            echo "any_service=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          if [ "${{ github.event_name }}" == "push" ]; then
            if [ "${{ github.event.before }}" == "0000000000000000000000000000000000000000" ]; then
               CHANGED=$(git diff --name-only HEAD~1 HEAD)
            else
               CHANGED=$(git diff --name-only ${{ github.event.before }} ${{ github.sha }})
            fi
          else
            CHANGED=$(git diff --name-only HEAD~1 HEAD)
          fi

          any=false
          for s in bff sso interaction media chat ws presence notification ai; do
            if echo "$CHANGED" | grep -qE "apps/$s-|libs/|package.json|pnpm-lock.yaml|app-compose.yml"; then
              echo "$s=true" >> $GITHUB_OUTPUT
              any=true
            else
              echo "$s=false" >> $GITHUB_OUTPUT
            fi
          done
          echo "any_service=$any" >> $GITHUB_OUTPUT

  lint-test:
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.any_service == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v2
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run lint
      - run: pnpm run build:all

  build:
    runs-on: ubuntu-latest
    needs: [detect-changes, lint-test]
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: bff
            service: bff-service
            enabled: ${{ needs.detect-changes.outputs.bff }}
          - name: sso
            service: sso-service
            enabled: ${{ needs.detect-changes.outputs.sso }}
          - name: interaction
            service: interaction-service
            enabled: ${{ needs.detect-changes.outputs.interaction }}
          - name: media
            service: media-service
            enabled: ${{ needs.detect-changes.outputs.media }}
          - name: chat
            service: chat-service
            enabled: ${{ needs.detect-changes.outputs.chat }}
          - name: ws
            service: ws-gateway
            enabled: ${{ needs.detect-changes.outputs.ws }}
          - name: presence
            service: presence-service
            enabled: ${{ needs.detect-changes.outputs.presence }}
          - name: notification
            service: notification-service
            enabled: ${{ needs.detect-changes.outputs.notification }}
          - name: ai
            service: ai-core-service
            enabled: ${{ needs.detect-changes.outputs.ai }}

    steps:
      - uses: actions/checkout@v4
        if: matrix.enabled == 'true'
      - uses: docker/setup-buildx-action@v3
        if: matrix.enabled == 'true'
      - uses: docker/login-action@v3
        if: matrix.enabled == 'true'
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ env.GH_TOKEN }}
      - uses: docker/metadata-action@v5
        if: matrix.enabled == 'true'
        id: meta
        with:
          images: ghcr.io/${{ env.IMAGE_PREFIX }}/${{ matrix.service }}
          tags: |
            type=sha
            type=raw,value=latest
      - uses: docker/build-push-action@v5
        if: matrix.enabled == 'true'
        with:
          context: .
          file: apps/${{ matrix.service }}/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    runs-on: ubuntu-latest
    needs: [detect-changes, build]
    if: needs.detect-changes.outputs.any_service == 'true'
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH Key
        run: |
          mkdir -p ~/.ssh
          echo "${{ env.EC2_SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ env.EC2_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Copy docker-compose files
        run: |
          scp -o BatchMode=yes -o ConnectTimeout=10 \
              infra-compose.yml \
              db-compose.yml \
              app-compose.yml \
              ${{ env.EC2_USER }}@${{ env.EC2_HOST }}:~/Backend/

      - name: Compute image tag
        id: image-tag
        run: echo "tag=sha-${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: Deploy Services
        id: deploy
        env:
          BFF_CHANGED: ${{ needs.detect-changes.outputs.bff }}
          SSO_CHANGED: ${{ needs.detect-changes.outputs.sso }}
          INTERACTION_CHANGED: ${{ needs.detect-changes.outputs.interaction }}
          MEDIA_CHANGED: ${{ needs.detect-changes.outputs.media }}
          CHAT_CHANGED: ${{ needs.detect-changes.outputs.chat }}
          WS_CHANGED: ${{ needs.detect-changes.outputs.ws }}
          PRESENCE_CHANGED: ${{ needs.detect-changes.outputs.presence }}
          NOTIFICATION_CHANGED: ${{ needs.detect-changes.outputs.notification }}
          AI_CHANGED: ${{ needs.detect-changes.outputs.ai }}
          DEPLOY_IMAGE_TAG: ${{ steps.image-tag.outputs.tag }}
        run: |
          ssh -o BatchMode=yes -o ConnectTimeout=10 ${{ env.EC2_USER }}@${{ env.EC2_HOST }} << 'DEPLOY_SCRIPT'
            set -euo pipefail
            cd ~/Backend
            mkdir -p .rollback

            echo "${{ env.GH_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            docker network prune -f
            docker network create --driver bridge --subnet 172.28.0.0/16 zalo_network 2>/dev/null || echo "Network exists"

            if [ -f .env.prod ]; then
              set -a
              source .env.prod
              set +a
            fi

            # Override IMAGE_TAG with the tag from current CI build
            export IMAGE_TAG="${{ env.DEPLOY_IMAGE_TAG }}"
            echo "📦 Deploying with IMAGE_TAG=$IMAGE_TAG"

            DEPLOYMENT_FAILED=false
            FAILED_SERVICES=""

            deploy_service() {
              local SERVICE_NAME=$1
              local COMPOSE_FILE=$2

              echo "🚀 Deploying $SERVICE_NAME from $COMPOSE_FILE"
              
              CONTAINER_ID=$(docker compose -f "$COMPOSE_FILE" ps -q "$SERVICE_NAME" 2>/dev/null || echo "")
              if [ -n "$CONTAINER_ID" ]; then
                CURRENT_IMAGE=$(docker inspect "$CONTAINER_ID" --format '{{ .Config.Image }}')
                echo "$CURRENT_IMAGE" > ".rollback/${SERVICE_NAME}.prev"
              else
                echo "none" > ".rollback/${SERVICE_NAME}.prev"
              fi

              if ! docker compose -f "$COMPOSE_FILE" pull "$SERVICE_NAME"; then
                echo "❌ Pull failed for $SERVICE_NAME"
                DEPLOYMENT_FAILED=true
                return 1
              fi

              if ! docker compose -f "$COMPOSE_FILE" up -d --no-deps --remove-orphans "$SERVICE_NAME"; then
                echo "❌ Up failed for $SERVICE_NAME"
                PREV_IMAGE=$(cat ".rollback/${SERVICE_NAME}.prev")
                if [ "$PREV_IMAGE" != "none" ]; then
                  echo "⏪ Rolling back $SERVICE_NAME..."
                  docker pull "$PREV_IMAGE" 2>/dev/null || true
                  # Force deploy with previous image
                  # We use the image name directly here via docker run or retag, 
                  # but simplest for compose is to try up again if config didn't change, 
                  # otherwise manual intervention might be needed. 
                  # For strict image rollback with compose, we'd need to sed the yaml.
                  # Here we try simple restart or warn.
                  docker compose -f "$COMPOSE_FILE" up -d --no-deps "$SERVICE_NAME" || true
                fi
                DEPLOYMENT_FAILED=true
                FAILED_SERVICES="$FAILED_SERVICES $SERVICE_NAME"
                return 1
              fi
              echo "✅ Deployed $SERVICE_NAME"
            }

            # Ensure Infra and DB are running first (optional but recommended)
            echo "Checking Infra & DB..."
            docker compose -f infra-compose.yml up -d --remove-orphans
            docker compose -f db-compose.yml up -d --remove-orphans

            [ "${{ env.BFF_CHANGED }}" = "true" ] && deploy_service bff-service app-compose.yml || true
            [ "${{ env.SSO_CHANGED }}" = "true" ] && deploy_service sso-service app-compose.yml || true
            [ "${{ env.INTERACTION_CHANGED }}" = "true" ] && deploy_service interaction-service app-compose.yml || true
            [ "${{ env.MEDIA_CHANGED }}" = "true" ] && deploy_service media-service app-compose.yml || true
            [ "${{ env.CHAT_CHANGED }}" = "true" ] && deploy_service chat-service app-compose.yml || true
            [ "${{ env.WS_CHANGED }}" = "true" ] && deploy_service ws-gateway app-compose.yml || true
            [ "${{ env.PRESENCE_CHANGED }}" = "true" ] && deploy_service presence-service app-compose.yml || true
            [ "${{ env.NOTIFICATION_CHANGED }}" = "true" ] && deploy_service notification-service app-compose.yml || true
            [ "${{ env.AI_CHANGED }}" = "true" ] && deploy_service ai-core-service app-compose.yml || true

            docker image prune -f

            if [ "$DEPLOYMENT_FAILED" = "true" ]; then
              echo "❌ Deployment failed for: $FAILED_SERVICES"
              exit 1
            fi
          DEPLOY_SCRIPT

      - name: Wait for containers
        run: sleep 30

      - name: Verify Health
        run: |
          ssh -o BatchMode=yes -o ConnectTimeout=10 ${{ env.EC2_USER }}@${{ env.EC2_HOST }} << 'HEALTH_SCRIPT'
            set -euo pipefail
            cd ~/Backend

            check_file() {
              local FILE=$1
              echo "Checking $FILE..."
              docker compose -f "$FILE" ps --format "table {{.Name}}\t{{.Status}}\t{{.Health}}"
              
              UNHEALTHY=$(docker compose -f "$FILE" ps --format json 2>/dev/null | jq -r 'select(.Health == "unhealthy") | .Name' 2>/dev/null || true)
              if [ -n "$UNHEALTHY" ]; then
                echo "❌ Unhealthy: $UNHEALTHY"
                return 1
              fi
              
              EXITED=$(docker compose -f "$FILE" ps --format json 2>/dev/null | jq -r 'select(.State == "exited" and .ExitCode != 0) | .Name' 2>/dev/null || true)
              if [ -n "$EXITED" ]; then
                 echo "❌ Exited: $EXITED"
                 return 1
              fi
            }

            check_file "infra-compose.yml"
            check_file "db-compose.yml"
            check_file "app-compose.yml"
          HEALTH_SCRIPT

      - name: Cleanup
        if: always()
        run: rm -rf ~/.ssh/id_rsa