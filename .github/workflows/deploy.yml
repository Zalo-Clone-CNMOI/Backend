# ================================================
# GitHub Actions - CI/CD Pipeline (Production)
# ================================================

name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
    paths:
      - 'apps/**'
      - 'libs/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'docker-compose.prod.yml'
      - '.github/workflows/**'

  workflow_dispatch:
    inputs:
      service:
        description: 'Service to deploy (all, bff, sso, interaction, media, chat, ws)'
        required: false
        default: 'all'

env:
  DOCKER_REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}/zalo-clone

# ================================================
# JOB 1: Detect Changes
# ================================================
jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      bff: ${{ steps.detect.outputs.bff }}
      sso: ${{ steps.detect.outputs.sso }}
      interaction: ${{ steps.detect.outputs.interaction }}
      media: ${{ steps.detect.outputs.media }}
      chat: ${{ steps.detect.outputs.chat }}
      ws: ${{ steps.detect.outputs.ws }}
      any_service: ${{ steps.detect.outputs.any_service }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - id: detect
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            SERVICE="${{ github.event.inputs.service }}"
            for s in bff sso interaction media chat ws; do
              if [ "$SERVICE" = "all" ] || [ "$SERVICE" = "$s" ]; then
                echo "$s=true" >> $GITHUB_OUTPUT
              else
                echo "$s=false" >> $GITHUB_OUTPUT
              fi
            done
            echo "any_service=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          CHANGED=$(git diff --name-only HEAD~1 HEAD)

          libs_changed=false
          echo "$CHANGED" | grep -q "^libs/" && libs_changed=true

          for s in bff sso interaction media chat ws; do
            path="apps/${s}-service/"
            [ "$s" = "ws" ] && path="apps/ws-gateway/"
            if echo "$CHANGED" | grep -q "^$path" || [ "$libs_changed" = true ]; then
              echo "$s=true" >> $GITHUB_OUTPUT
            else
              echo "$s=false" >> $GITHUB_OUTPUT
            fi
          done

          if echo "$CHANGED" | grep -qE "^(apps/|libs/|package.json|pnpm-lock.yaml)"; then
            echo "any_service=true" >> $GITHUB_OUTPUT
          else
            echo "any_service=false" >> $GITHUB_OUTPUT
          fi

# ================================================
# JOB 2: Lint & Test (FIXED PNPM CACHE)
# ================================================
  lint-test:
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.any_service == 'true'

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js + pnpm cache
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - uses: pnpm/action-setup@v2
        with:
          version: 9
          run_install: false

      - run: pnpm install --frozen-lockfile
      - run: pnpm run lint
      - run: pnpm run test

# ================================================
# JOB 3: Build & Push Docker Images (Matrix)
# ================================================
  build:
    runs-on: ubuntu-latest
    needs: [detect-changes, lint-test]

    strategy:
      matrix:
        include:
          - name: bff
            service: bff-service
            enabled: ${{ needs.detect-changes.outputs.bff }}
          - name: sso
            service: sso-service
            enabled: ${{ needs.detect-changes.outputs.sso }}
          - name: interaction
            service: interaction-service
            enabled: ${{ needs.detect-changes.outputs.interaction }}
          - name: media
            service: media-service
            enabled: ${{ needs.detect-changes.outputs.media }}
          - name: chat
            service: chat-service
            enabled: ${{ needs.detect-changes.outputs.chat }}
          - name: ws
            service: ws-gateway
            enabled: ${{ needs.detect-changes.outputs.ws }}

    if: matrix.enabled == 'true'

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ghcr.io/${{ env.IMAGE_PREFIX }}/${{ matrix.service }}
          tags: |
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}

      - uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/${{ matrix.service }}/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

# ================================================
# JOB 4: Deploy + Rollback
# ================================================
  deploy:
    runs-on: ubuntu-latest
    needs: [detect-changes, build]
    if: needs.detect-changes.outputs.any_service == 'true'
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy with rollback support
        run: |
          ssh ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << 'EOF'
            set -e
            cd ~/zalo-clone
            mkdir -p .rollback

            docker login ghcr.io -u ${{ github.actor }} -p ${{ secrets.GITHUB_TOKEN }}

            deploy_service () {
              NAME=$1
              CONTAINER=$2

              CURRENT=$(docker inspect $CONTAINER --format '{{ .Config.Image }}' 2>/dev/null || true)
              echo "$CURRENT" > .rollback/$CONTAINER.prev

              echo "🚀 Deploying $CONTAINER"
              if ! docker compose -f docker-compose.prod.yml pull $CONTAINER ||
                 ! docker compose -f docker-compose.prod.yml up -d --no-deps $CONTAINER; then

                echo "❌ Deploy failed, rolling back $CONTAINER"
                OLD=$(cat .rollback/$CONTAINER.prev)
                docker pull $OLD
                docker compose -f docker-compose.prod.yml up -d --no-deps $CONTAINER
              fi
            }

            [ "${{ needs.detect-changes.outputs.bff }}" = "true" ] && deploy_service bff bff-service
            [ "${{ needs.detect-changes.outputs.sso }}" = "true" ] && deploy_service sso sso-service
            [ "${{ needs.detect-changes.outputs.interaction }}" = "true" ] && deploy_service interaction interaction-service
            [ "${{ needs.detect-changes.outputs.media }}" = "true" ] && deploy_service media media-service
            [ "${{ needs.detect-changes.outputs.chat }}" = "true" ] && deploy_service chat chat-service
            [ "${{ needs.detect-changes.outputs.ws }}" = "true" ] && deploy_service ws ws-gateway

            docker image prune -f
          EOF
