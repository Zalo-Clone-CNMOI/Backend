# ================================================
# GitHub Actions - CI/CD Pipeline (Production)
# ================================================
# Production-grade pipeline with:
# - SSH connectivity validation (fail fast)
# - Deployment safety with rollback
# - Post-deployment health verification
# - Clear failure semantics
# ================================================

name: CI/CD Pipeline

on:
  push:
    branches: [main]
    paths:
      - "apps/**"
      - "libs/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "docker-compose.prod.yml"
      - ".github/workflows/**"

  workflow_dispatch:
    inputs:
      service:
        description: "Service to deploy (all, bff, sso, interaction, media, chat, ws)"
        required: false
        default: "all"
        
permissions:
  contents: read
  packages: write

env:
  DOCKER_REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}/zalo-clone
  EC2_HOST: ${{ secrets.EC2_HOST }}
  EC2_USER: ${{ secrets.EC2_USER }}
  EC2_SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

# ================================================
# JOB 1: Detect Changes
# ================================================
jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      bff: ${{ steps.detect.outputs.bff }}
      sso: ${{ steps.detect.outputs.sso }}
      interaction: ${{ steps.detect.outputs.interaction }}
      media: ${{ steps.detect.outputs.media }}
      chat: ${{ steps.detect.outputs.chat }}
      ws: ${{ steps.detect.outputs.ws }}
      any_service: ${{ steps.detect.outputs.any_service }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - id: detect
        name: Detect changes
        run: |
          echo "🔍 Start detecting changes..."

          # ==========================================
          # FORCE RUN (manual override)
          # ==========================================
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ github.event.inputs.force }}" = "true" ]; then
            echo "⚠️ FORCE DEPLOY ENABLED – skipping change detection"

            for s in bff sso interaction media chat ws; do
              echo "$s=true" >> $GITHUB_OUTPUT
            done

            echo "any_service=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          # ==========================================
          # MANUAL RUN (select service)
          # ==========================================
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            SERVICE="${{ github.event.inputs.service }}"
            echo "🚀 Manual deploy service: $SERVICE"

            for s in bff sso interaction media chat ws; do
              if [ "$SERVICE" = "all" ] || [ "$SERVICE" = "$s" ]; then
                echo "$s=true" >> $GITHUB_OUTPUT
              else
                echo "$s=false" >> $GITHUB_OUTPUT
              fi
            done

            echo "any_service=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          # ==========================================
          # AUTO RUN (push to main)
          # ==========================================
          echo "🔍 Detecting changes based on commit range..."
          # Nếu là push event, so sánh từ commit trước đó đến commit hiện tại
          if [ "${{ github.event_name }}" == "push" ]; then
            # Xử lý trường hợp push lần đầu hoặc force push (before có thể là all zeros)
            if [ "${{ github.event.before }}" == "0000000000000000000000000000000000000000" ]; then
               # Fallback cho trường hợp không có history
               CHANGED=$(git diff --name-only HEAD~1 HEAD)
            else
               # So sánh range từ lần push trước đến hiện tại
               CHANGED=$(git diff --name-only ${{ github.event.before }} ${{ github.sha }})
            fi
          else
            # Fallback mặc định
            CHANGED=$(git diff --name-only HEAD~1 HEAD)
          fi

          echo "Changed files:"
          echo "$CHANGED"

          any=false

  # ================================================
  # JOB 2: Lint & Test
  # ================================================
  lint-test:
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.any_service == 'true'

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v2
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm run lint
      - run: pnpm run build:all

  # ================================================
  # JOB 3: Build & Push Docker Images (Matrix)
  # ================================================
  build:
    runs-on: ubuntu-latest
    needs: [detect-changes, lint-test]

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: bff
            service: bff-service
            enabled: ${{ needs.detect-changes.outputs.bff }}
          - name: sso
            service: sso-service
            enabled: ${{ needs.detect-changes.outputs.sso }}
          - name: interaction
            service: interaction-service
            enabled: ${{ needs.detect-changes.outputs.interaction }}
          - name: media
            service: media-service
            enabled: ${{ needs.detect-changes.outputs.media }}
          - name: chat
            service: chat-service
            enabled: ${{ needs.detect-changes.outputs.chat }}
          - name: ws
            service: ws-gateway
            enabled: ${{ needs.detect-changes.outputs.ws }}

    steps:
      - uses: actions/checkout@v4

      - name: Skip job if service not enabled
        if: matrix.enabled != 'true'
        run: |
          echo "Service ${{ matrix.service }} not enabled for build. Skipping job."
          exit 0

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ env.GH_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ghcr.io/${{ env.IMAGE_PREFIX }}/${{ matrix.service }}
          tags: |
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}

      - uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/${{ matrix.service }}/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ================================================
  # JOB 4: Deploy to Production (with fail-fast and health checks)
  # ================================================
  deploy:
    runs-on: ubuntu-latest
    needs: [detect-changes, build]
    if: needs.detect-changes.outputs.any_service == 'true'
    environment: production

    steps:
      - uses: actions/checkout@v4

      # ------------------------------------------
      # STEP 1: Setup SSH Key
      # ------------------------------------------
      - name: Setup SSH Key
        run: |
          mkdir -p ~/.ssh
          echo "${{ env.EC2_SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ env.EC2_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true

      # ------------------------------------------
      # STEP 2: Validate SSH Connectivity (FAIL FAST)
      # ------------------------------------------
      - name: Validate SSH Connectivity
        id: ssh_check
        run: |
          echo "🔌 Testing SSH connectivity to ${{ env.EC2_HOST }}..."

          if ! ssh -o BatchMode=yes \
                   -o ConnectTimeout=10 \
                   -o StrictHostKeyChecking=no \
                   ${{ env.EC2_USER }}@${{ env.EC2_HOST }} \
                   "echo '✅ SSH connection successful'"; then
            echo "❌ FATAL: Cannot connect to EC2 instance"
            echo "   - Check EC2_HOST, EC2_USER, EC2_SSH_PRIVATE_KEY secrets"
            echo "   - Verify security group allows SSH from GitHub Actions"
            echo "   - Verify EC2 instance is running"
            exit 1
          fi

          echo "✅ SSH connectivity validated"

      # ------------------------------------------
      # STEP 3: Copy docker-compose to server
      # ------------------------------------------
      - name: Copy docker-compose to server
        run: |
          scp -o BatchMode=yes \
              -o ConnectTimeout=10 \
              docker-compose.prod.yml \
              ${{ env.EC2_USER }}@${{ env.EC2_HOST }}:~/Backend/

      # ------------------------------------------
      # STEP 4: Deploy Services with Rollback Support
      # ------------------------------------------
      - name: Deploy Services
        id: deploy
        env:
          BFF_CHANGED: ${{ needs.detect-changes.outputs.bff }}
          SSO_CHANGED: ${{ needs.detect-changes.outputs.sso }}
          INTERACTION_CHANGED: ${{ needs.detect-changes.outputs.interaction }}
          MEDIA_CHANGED: ${{ needs.detect-changes.outputs.media }}
          CHAT_CHANGED: ${{ needs.detect-changes.outputs.chat }}
          WS_CHANGED: ${{ needs.detect-changes.outputs.ws }}
        run: |
          DEPLOY_FAILED=false

          ssh -o BatchMode=yes \
              -o ConnectTimeout=10 \
              ${{ env.EC2_USER }}@${{ env.EC2_HOST }} << 'DEPLOY_SCRIPT'
            set -euo pipefail

            cd ~/Backend
            mkdir -p .rollback

            echo "🔐 Authenticating with GitHub Container Registry..."
            echo "${{ env.GH_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # Load environment variables
            if [ -f .env.prod ]; then
              set -a
              source .env.prod
              set +a
            fi

            DEPLOYMENT_FAILED=false
            FAILED_SERVICES=""

            deploy_service() {
              local SERVICE_NAME=$1
              local CONTAINER_NAME=$2

              echo ""
              echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
              echo "🚀 Deploying: $CONTAINER_NAME"
              echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

              # Save current image for rollback
              CURRENT_IMAGE=$(docker inspect "$CONTAINER_NAME" --format '{{ .Config.Image }}' 2>/dev/null || echo "none")
              echo "$CURRENT_IMAGE" > ".rollback/${CONTAINER_NAME}.prev"
              echo "� Current image: $CURRENT_IMAGE"

              # Pull new image
              echo "📥 Pulling new image..."
              if ! docker compose -f docker-compose.prod.yml pull "$CONTAINER_NAME"; then
                echo "❌ FAILED: docker compose pull $CONTAINER_NAME"
                DEPLOYMENT_FAILED=true
                FAILED_SERVICES="$FAILED_SERVICES $CONTAINER_NAME"
                return 1
              fi

              # Deploy new container
              echo "🔄 Starting new container..."
              if ! docker compose -f docker-compose.prod.yml up -d --no-deps "$CONTAINER_NAME"; then
                echo "❌ FAILED: docker compose up $CONTAINER_NAME"

                # Attempt rollback
                if [ "$CURRENT_IMAGE" != "none" ]; then
                  echo "⏪ Attempting rollback to $CURRENT_IMAGE..."
                  docker pull "$CURRENT_IMAGE" 2>/dev/null || true
                  docker compose -f docker-compose.prod.yml up -d --no-deps "$CONTAINER_NAME" 2>/dev/null || true
                  echo "⚠️  Rollback attempted (may or may not have succeeded)"
                fi

                DEPLOYMENT_FAILED=true
                FAILED_SERVICES="$FAILED_SERVICES $CONTAINER_NAME"
                return 1
              fi

              echo "✅ Successfully deployed: $CONTAINER_NAME"
              return 0
            }

            # Deploy changed services
            [ "${{ env.BFF_CHANGED }}" = "true" ] && deploy_service bff bff-service || true
            [ "${{ env.SSO_CHANGED }}" = "true" ] && deploy_service sso sso-service || true
            [ "${{ env.INTERACTION_CHANGED }}" = "true" ] && deploy_service interaction interaction-service || true
            [ "${{ env.MEDIA_CHANGED }}" = "true" ] && deploy_service media media-service || true
            [ "${{ env.CHAT_CHANGED }}" = "true" ] && deploy_service chat chat-service || true
            [ "${{ env.WS_CHANGED }}" = "true" ] && deploy_service ws ws-gateway || true

            # Clean up old images
            echo ""
            echo "🧹 Cleaning up old images..."
            docker image prune -f

            # Report deployment status
            echo ""
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            if [ "$DEPLOYMENT_FAILED" = "true" ]; then
              echo "❌ DEPLOYMENT FAILED"
              echo "   Failed services:$FAILED_SERVICES"
              exit 1
            else
              echo "✅ ALL DEPLOYMENTS SUCCESSFUL"
            fi
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          DEPLOY_SCRIPT

          if [ $? -ne 0 ]; then
            echo "DEPLOY_FAILED=true" >> $GITHUB_OUTPUT
            exit 1
          fi

      # ------------------------------------------
      # STEP 5: Post-Deployment Health Verification
      # ------------------------------------------
      - name: Wait for containers to initialize
        run: |
          echo "⏳ Waiting 30 seconds for containers to initialize..."
          sleep 30

      - name: Verify Container Health
        run: |
          echo "🔍 Verifying container health..."

          HEALTH_CHECK_FAILED=false

          ssh -o BatchMode=yes \
              -o ConnectTimeout=10 \
              ${{ env.EC2_USER }}@${{ env.EC2_HOST }} << 'HEALTH_SCRIPT'
            set -euo pipefail
            cd ~/Backend

            echo ""
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo "📊 CONTAINER STATUS"
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

            docker compose -f docker-compose.prod.yml ps --format "table {{.Name}}\t{{.Status}}\t{{.Health}}"

            echo ""
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo "🔍 HEALTH CHECK RESULTS"
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

            UNHEALTHY_CONTAINERS=""
            EXITED_CONTAINERS=""

            # Check for unhealthy containers
            UNHEALTHY=$(docker compose -f docker-compose.prod.yml ps --format json | jq -r 'select(.Health == "unhealthy") | .Name' 2>/dev/null || true)
            if [ -n "$UNHEALTHY" ]; then
              UNHEALTHY_CONTAINERS="$UNHEALTHY"
              echo "❌ UNHEALTHY containers detected:"
              echo "$UNHEALTHY" | while read -r container; do
                echo "   - $container"
              done
            fi

            # Check for exited containers
            EXITED=$(docker compose -f docker-compose.prod.yml ps --format json | jq -r 'select(.State == "exited") | .Name' 2>/dev/null || true)
            if [ -n "$EXITED" ]; then
              EXITED_CONTAINERS="$EXITED"
              echo "❌ EXITED containers detected:"
              echo "$EXITED" | while read -r container; do
                echo "   - $container"
                echo "   Last logs:"
                docker logs --tail 20 "$container" 2>&1 | sed 's/^/     /'
              done
            fi

            # Final verdict
            echo ""
            if [ -n "$UNHEALTHY_CONTAINERS" ] || [ -n "$EXITED_CONTAINERS" ]; then
              echo "❌ HEALTH CHECK FAILED"
              echo "   Some containers are unhealthy or exited."
              echo "   Please check the logs above for details."
              exit 1
            else
              echo "✅ ALL CONTAINERS HEALTHY"
            fi
          HEALTH_SCRIPT

          if [ $? -ne 0 ]; then
            echo "❌ Health check failed!"
            exit 1
          fi

          echo "✅ Health verification completed successfully"

      # ------------------------------------------
      # STEP 6: Cleanup SSH Key
      # ------------------------------------------
      - name: Cleanup SSH
        if: always()
        run: |
          rm -rf ~/.ssh/id_rsa

      # ------------------------------------------
      # STEP 7: Report Deployment Status
      # ------------------------------------------
      - name: Report Success
        if: success()
        run: |
          echo ""
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "✅ DEPLOYMENT COMPLETED SUCCESSFULLY"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "Commit: ${{ github.sha }}"
          echo "Branch: ${{ github.ref_name }}"
          echo "Triggered by: ${{ github.actor }}"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

      - name: Report Failure
        if: failure()
        run: |
          echo ""
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "❌ DEPLOYMENT FAILED"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "Commit: ${{ github.sha }}"
          echo "Branch: ${{ github.ref_name }}"
          echo "Triggered by: ${{ github.actor }}"
          echo ""
          echo "Please check the logs above for details."
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
