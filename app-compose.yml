    container_name: zalo_ws_gateway
    build:
      context: .
      dockerfile: apps/ws-gateway/Dockerfile
    environment:
      NODE_ENV: production
      PORT: 3001
      SERVICE_NAME: ws-gateway
      BFF_SERVICE_URL: http://bff-service:5000/api
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-1h}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-7d}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3000,http://localhost:3001,http://localhost:8081,https://frontend-web-eight-neon.vercel.app}
