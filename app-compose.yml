name: app-compose-prod

services:
  caddy:
    image: caddy:2.8-alpine
    container_name: zalo_caddy
    # TLS termination + reverse proxy. Fronts the browser-facing services so the
    # HTTPS Vercel frontend can reach them over wss:// / https:// — a plain
    # ws://IP:3001 is blocked by browser Mixed Content rules.
    environment:
      # Public hostname Caddy requests a Let's Encrypt cert for. Default uses
      # nip.io against the current Elastic IP; override via .env.prod when a real
      # domain is added (e.g. PUBLIC_HOSTNAME=api.example.com).
      PUBLIC_HOSTNAME: ${PUBLIC_HOSTNAME:-18-138-217-102.nip.io}
      CADDY_ACME_EMAIL: ${CADDY_ACME_EMAIL:-admin@example.com}
    ports:
      # 80 is required for the Let's Encrypt HTTP-01 challenge + HTTP->HTTPS
      # redirect; 443 serves HTTPS/WSS.
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      # Persist issued certs + ACME account across restarts to avoid hitting
      # Let's Encrypt rate limits on every redeploy.
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - zalo_network
    restart: unless-stopped
    depends_on:
      - bff-service
      - ws-gateway
    healthcheck:
      test:
        ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    deploy:
      resources:
        limits:
          cpus: "0.3"
          memory: 256M
        reservations:
          cpus: "0.1"
          memory: 64M

  bff-service:
    image: ${DOCKER_REGISTRY:-ghcr.io}/${DOCKER_IMAGE_PREFIX:-zalo-clone}/bff-service:${IMAGE_TAG:-latest}
    container_name: zalo_bff_service
    build:
      context: .
      dockerfile: apps/bff-service/Dockerfile
    environment:
      NODE_ENV: production
      PORT: 5000
      SERVICE_NAME: bff-service
      BFF_SERVICE_URL: http://bff-service:5000/api
      SSO_SERVICE_URL: http://sso-service:5001/api
      AI_CORE_SERVICE_URL: http://ai-core-service:5005/api
      CHAT_SERVICE_URL: http://chat-service:5002/api
      INTERACTION_SERVICE_URL: http://interaction-service:5004/api
      MEDIA_SERVICE_URL: http://media-service:3003/api
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-1h}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-7d}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3000,http://localhost:3001,http://localhost:8081,https://frontend-web-eight-neon.vercel.app}
      KAFKA_BROKERS: kafka:29092
      KAFKA_CLIENT_ID: bff-service
      REDIS_URL: redis://redis:6379
    ports:
      - "${BFF_PORT:-5000}:5000"
    networks:
      - zalo_network
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://localhost:5000/api/health",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 256M

  sso-service:
    image: ${DOCKER_REGISTRY:-ghcr.io}/${DOCKER_IMAGE_PREFIX:-zalo-clone}/sso-service:${IMAGE_TAG:-latest}
    container_name: zalo_sso_service
    build:
      context: .
      dockerfile: apps/sso-service/Dockerfile
    environment:
      NODE_ENV: production
      PORT: 5001
      SERVICE_NAME: sso-service
      BFF_SERVICE_URL: http://bff-service:5000/api
      SSO_SERVICE_URL: http://sso-service:5001/api
      INTERACTION_SERVICE_URL: http://interaction-service:5004/api
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-1h}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-7d}
      DATABASE_URL: postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@${DB_HOST:-postgres}:5432/${POSTGRES_DB:-postgres}
      DB_SSL: "true"
      FIREBASE_PROJECT_ID: ${FIREBASE_PROJECT_ID}
      FIREBASE_CLIENT_EMAIL: ${FIREBASE_CLIENT_EMAIL}
      FIREBASE_PRIVATE_KEY: ${FIREBASE_PRIVATE_KEY}
      REDIS_URL: redis://redis:6379
      KAFKA_BROKERS: kafka:29092
      KAFKA_CLIENT_ID: sso-service
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3000,http://localhost:3001,http://localhost:8081,https://frontend-web-eight-neon.vercel.app}
      DB_HOST: ${DB_HOST:-postgres}
      DB_PORT: 5432
      DB_USERNAME: ${POSTGRES_USER:-postgres}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      DB_NAME: ${POSTGRES_DB:-postgres}
    networks:
      - zalo_network
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://localhost:5001/api/health",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 256M

  interaction-service:
    image: ${DOCKER_REGISTRY:-ghcr.io}/${DOCKER_IMAGE_PREFIX:-zalo-clone}/interaction-service:${IMAGE_TAG:-latest}
    container_name: zalo_interaction_service
    build:
      context: .
      dockerfile: apps/interaction-service/Dockerfile
    environment:
      NODE_ENV: production
      PORT: 5004
      SERVICE_NAME: interaction-service
