      # CDN_BASE_URL: ${CDN_BASE_URL}
      KAFKA_BROKERS: kafka:29092
      KAFKA_CLIENT_ID: media-service
      KAFKA_GROUP_ID: media-service-persist
      REDIS_URL: redis://redis:6379
      DATABASE_URL: postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@${DB_HOST:-postgres}:${DB_PORT:-5432}/${POSTGRES_DB:-postgres}
      DB_SSL: ${DB_SSL:-true}
