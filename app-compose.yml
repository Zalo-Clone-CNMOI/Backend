      DATABASE_URL: postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@${DB_HOST:-postgres}:5432/${POSTGRES_DB:-postgres}
      DB_SSL: "true"
      DB_HOST: ${DB_HOST:-postgres}
      DB_PORT: 5432
      DB_USERNAME: ${POSTGRES_USER:-postgres}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      DB_NAME: ${POSTGRES_DB:-postgres}
      REDIS_URL: redis://redis:6379
      SCYLLA_CONTACT_POINTS: scylla
      SCYLLA_LOCAL_DATACENTER: datacenter1
      SCYLLA_KEYSPACE: chat
      CHAT_PRE_SEND_MODERATION_ENABLED: ${CHAT_PRE_SEND_MODERATION_ENABLED:-true}
      CHAT_PRE_SEND_MODERATION_SKIP_CONV_TYPES: ${CHAT_PRE_SEND_MODERATION_SKIP_CONV_TYPES:-ai_assistant}
      CHAT_PRE_SEND_MODERATION_TIMEOUT_MS: ${CHAT_PRE_SEND_MODERATION_TIMEOUT_MS:-2000}
      CHAT_PRE_SEND_MODERATION_CONFIDENCE_THRESHOLD: ${CHAT_PRE_SEND_MODERATION_CONFIDENCE_THRESHOLD:-0.70}
      CHAT_PRE_SEND_MODERATION_CACHE_TTL_SECONDS: ${CHAT_PRE_SEND_MODERATION_CACHE_TTL_SECONDS:-86400}
      CHAT_PRE_SEND_MODERATION_BLOCK_CACHE_TTL_SECONDS: ${CHAT_PRE_SEND_MODERATION_BLOCK_CACHE_TTL_SECONDS:-900}
