# Coturn TURN server configuration

# Listening ports
listening-port=3478
tls-listening-port=5349

# Use HMAC-based short-term credentials (matches IceServerService)
use-auth-secret
# IMPORTANT: thay CHANGE_ME bằng secret thực, khớp với COTURN_SECRET trong .env
static-auth-secret=9ebc054b12de0159271b3f8d7862ad6a30204efa8ff52b0841ca73e77fa0180f

# Realm — thay bằng domain hoặc IP server của bạn
realm=18.138.217.102

# Relay address — Coturn sẽ tự detect khi để trống; set nếu server có nhiều NIC
relay-ip=172.31.19.110

# External IP mapping (bắt buộc nếu server nằm sau NAT, ví dụ AWS EC2)
external-ip=18.138.217.102/172.31.19.110

# UDP relay port range
min-port=49152
max-port=65535

# Logging
log-file=/var/log/coturn/turnserver.log
verbose

# Disable plain-text TURN (tùy chọn, bật nếu dùng TLS)
# no-udp
# no-tcp

# Không cho relay đến internal network (bảo mật)
no-multicast-peers
denied-peer-ip=0.0.0.0-0.255.255.255
denied-peer-ip=10.0.0.0-10.255.255.255
denied-peer-ip=127.0.0.0-127.255.255.255
denied-peer-ip=169.254.0.0-169.254.255.255
denied-peer-ip=172.16.0.0-172.31.255.255
denied-peer-ip=192.168.0.0-192.168.255.255
