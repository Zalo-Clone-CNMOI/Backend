packages:
  - apps/*
  - libs/*
ignoredBuiltDependencies:
  - '@nestjs/core'
  - '@scarf/scarf'
  - bcrypt
overrides:
  # ── CVE / audit remediations ─────────────────────────────────────────────
  # Each entry pins the minimum safe version for a given vulnerable range.
  # Ranges are intentionally tight (lower bound = first affected, upper = last
  # affected) so upgrades that already satisfy the constraint are unaffected.

  lodash@>=4.0.0 <=4.17.22: '>=4.17.23'
  diff@>=4.0.0 <4.0.4: '>=4.0.4'

  # fast-xml-parser — consolidated from 8 overlapping entries
  fast-xml-parser@>=4.0.0-beta.0 <4.5.5: '>=4.5.5'
  fast-xml-parser@>=5.0.0 <5.5.7: '>=5.5.7'

  qs@>=6.7.0 <=6.14.1: '>=6.14.2'

  # axios — <1.15.0 subsumes the narrower >=1.0.0 <=1.13.4 range
  axios@<1.15.0: '>=1.15.0'

  # minimatch — two major-version ranges; latest bounds subsume earlier ones
  minimatch@>=9.0.0 <9.0.7: '>=9.0.7'
  minimatch@>=10.0.0 <10.2.3: '>=10.2.3'

  # basic-ftp — <=5.2.1 subsumes <5.2.0
  basic-ftp@<=5.2.1: '>=5.2.2'

  multer@<2.1.1: '>=2.1.1'

  '@tootallnate/once@<3.0.1': '>=3.0.1'

  # file-type — unified range; highest required version is 21.3.2
  file-type@>=13.0.0 <=21.3.1: '>=21.3.2'

  socket.io-parser@>=4.0.0 <4.2.6: '>=4.2.6'

  brace-expansion@>=2.0.0 <2.0.3: '>=2.0.3'
  '@isaacs/brace-expansion@<=5.0.0': '>=5.0.1'

  # node-forge — <1.4.0 subsumes <=1.3.3
  node-forge@<1.4.0: '>=1.4.0'

  path-to-regexp@>=8.0.0 <8.4.0: '>=8.4.0'

  '@nestjs/core@<=11.1.17': '>=11.1.18'
